  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Outfit', sans-serif; }

    .feed-container {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .video-slide {
      height: 100%;
      width: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      flex-shrink: 0;
      background: #000;
    }

    .video-slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(transparent 60%, rgba(0,0,0,0.5) 100%);
    }

    .video-error-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      gap: 12px;
      background: #0a0a0a;
    }

    .play-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    .play-indicator.show {
      transform: translate(-50%,-50%) scale(1);
      opacity: 1;
    }
    .play-indicator.hide-anim {
      transform: translate(-50%,-50%) scale(1.3);
      opacity: 0;
    }

    .feed-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 16px 20px;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
      pointer-events: none;
    }

    .video-counter {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 50;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
    }

    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      z-index: 60;
      height: 3px;
      background: #e44;
      transition: width 0.3s ease;
    }

    .loading-spinner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .side-actions {
      position: absolute;
      right: 14px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 20;
    }
    .side-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      border: none; color: #fff;
    }
    .side-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
    .side-btn.liked { background: rgba(230,50,50,0.6); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

        if (loader) loader.style.display = 'none';

    loadVideo(0);

    container.addEventListener('click', (e) => {

      if (!slide) return;
      if (e.target.closest('.side-btn')) return;

      if (!vid || !vid.src) return;

          lucide.createIcons();

    // ── SIDE BUTTONS ──
    container.addEventListener('click', (e) => {
      const likeBtn = e.target.closest('[data-like]');
      if (likeBtn) {
        const idx = likeBtn.dataset.like;

      if (muteBtn) {

        if (vid) {

    // ── ELEMENT SDK ──
    const defaultConfig = {
      feed_title: "Video Feed",
      background_color: "#000000",
      accent_color: "#e44444",
      text_color: "#ffffff",
      surface_color: "#1a1a1a",
      font_family: "Outfit",
      font_size: 16
    };

    function applyConfig(config) {
      const title = config.feed_title || defaultConfig.feed_title;
      const accent = config.accent_color || defaultConfig.accent_color;
      const textCol = config.text_color || defaultConfig.text_color;
      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;

      document.getElementById('feedTitle').textContent = title;
      document.getElementById('feedTitle').style.fontFamily = `${font}, sans-serif`;
      document.getElementById('feedTitle').style.fontSize = `${size * 1.15}px`;
      document.getElementById('feedTitle').style.color = textCol;
      progressBar.style.background = accent;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
      }),
      mapToEditPanelValues: (config) => new Map([
        ["feed_title", config.feed_title || defaultConfig.feed_title]
      ])
    });

    console.log(`[Feed] Initialized with ${VIDEOS.length} videos`);
